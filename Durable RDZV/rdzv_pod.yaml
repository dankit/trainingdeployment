apiVersion: v1
kind: Pod
metadata:
  name: rdzv-server
  labels:
    app: rdzv-server
spec:
  nodeSelector:
    cloud.google.com/gke-nodepool: default-pool   # durable node
  containers:
    - name: rdzv
      image: us-central1-docker.pkg.dev/apt-passage-465114-b4/reranker-training-repo/reranker-training
      command: ["python"]
      args: ["rdzv_server.py"]
      ports:
        - containerPort: 29400